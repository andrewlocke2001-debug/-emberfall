<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>Verdant Vale — MMO (M0)</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0d1018; color: #e6e6e6;
        font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
      #game { width: 100vw; height: 100vh; }
      #game canvas { display: block; }
      #login { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column;
        gap: 16px; align-items: center; justify-content: center; background: #0d1018; }
      #login h1 { margin: 0; font-size: 30px; letter-spacing: 1px; }
      #login .row { display: flex; gap: 8px; }
      #login input { padding: 11px 13px; font-size: 16px; border-radius: 8px;
        border: 1px solid #2a3142; background: #1a2030; color: #fff; outline: none; }
      #login input:focus { border-color: #3b82f6; }
      #login button { padding: 11px 20px; font-size: 16px; font-weight: 600; border-radius: 8px;
        border: 0; background: #3b82f6; color: #fff; cursor: pointer; }
      #login button:hover { background: #2f6fe0; }
      #login .hint { font-size: 13px; color: #8893a7; max-width: 360px; text-align: center; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="login">
      <h1>⚔ Verdant Vale</h1>
      <div class="row">
        <input id="name" type="text" placeholder="Your name" maxlength="24" autocomplete="off" />
        <button id="enter" type="button">Enter World</button>
      </div>
      <div class="hint">Move: WASD / arrows · Target: click an entity (Esc to clear) · Attack: hold Space</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
