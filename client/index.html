<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <title>Emberfall</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0d1018; color: #e6e6e6;
        font-family: system-ui, -apple-system, sans-serif; overflow: hidden;
        overscroll-behavior: none; }
      #game { width: 100vw; height: 100vh; }
      /* touch-action:none so dragging the joystick doesn't scroll/zoom the page */
      #game canvas { display: block; touch-action: none; }
      #login { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column;
        gap: 16px; align-items: center; justify-content: center; background: #0d1018; }
      #login h1 { margin: 0; font-size: 30px; letter-spacing: 1px; }
      #login .row { display: flex; gap: 8px; }
      #login input { padding: 11px 13px; font-size: 16px; border-radius: 8px;
        border: 1px solid #2a3142; background: #1a2030; color: #fff; outline: none; }
      #login input:focus { border-color: #3b82f6; }
      #login button { padding: 11px 20px; font-size: 16px; font-weight: 600; border-radius: 8px;
        border: 0; background: #3b82f6; color: #fff; cursor: pointer; }
      #login button:hover { background: #2f6fe0; }
      #login button.secondary { background: #2a3142; }
      #login button.secondary:hover { background: #353e54; }
      #login input { width: 260px; }
      /* Stack the auth buttons full-width so they never overlap (and read well
         on mobile). */
      #login .row { flex-direction: column; width: 260px; }
      #login .row button { width: 100%; }
      #login .hint { font-size: 13px; color: #8893a7; max-width: 360px; text-align: center; line-height: 1.5; }
      #login-error { font-size: 14px; color: #ef4444; min-height: 18px; text-align: center; }
      .hint-mobile { display: none; }
      @media (pointer: coarse) {
        .hint-desktop { display: none; }
        .hint-mobile { display: block; }
      }

      /* In-game HUD + chat (shown by ChatBox once you're in the world) */
      #hud { position: fixed; top: 10px; left: 12px; z-index: 5; display: none;
        font-size: 14px; color: #cdd6e6; background: rgba(13,16,24,0.55);
        padding: 4px 10px; border-radius: 6px; pointer-events: none; }
      #chat { position: fixed; bottom: 10px; left: 10px; z-index: 6; display: none;
        flex-direction: column; gap: 6px; width: min(360px, 72vw); }
      #chat-log { display: flex; flex-direction: column; gap: 2px; max-height: 28vh;
        overflow-y: auto; font-size: 13px; line-height: 1.35; }
      #chat-log .line { background: rgba(13,16,24,0.5); padding: 2px 8px; border-radius: 6px;
        width: fit-content; max-width: 100%; word-break: break-word; }
      #chat-log .from { color: #ffe066; }
      #chat-log .global .from { color: #7cc7ff; }
      #chat-row { display: flex; gap: 6px; }
      #chat-channel { flex: 0 0 auto; padding: 6px 10px; border: 0; border-radius: 6px;
        cursor: pointer; font-size: 13px; background: #2a3142; color: #cdd6e6; }
      #chat-channel.global { background: #21406b; color: #cfe4ff; }
      #chat-input { flex: 1 1 auto; padding: 6px 10px; border-radius: 6px;
        border: 1px solid #2a3142; background: rgba(26,32,48,0.92); color: #fff;
        font-size: 14px; outline: none; }
      #chat-input:focus { border-color: #3b82f6; }

      /* Ability bar (shown by AbilityBar once in the world) */
      #abilities { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
        z-index: 6; display: none; flex-direction: column; align-items: center; gap: 6px; }
      #abilities .energy { width: 196px; height: 7px; border-radius: 4px; overflow: hidden;
        background: rgba(13,16,24,0.7); border: 1px solid #2a3142; }
      #abilities .energy-fill { height: 100%; width: 100%; background: #f4c542; transition: width 0.12s linear; }
      #abilities .ability-row { display: flex; gap: 8px; }
      #abilities .ability-slot { position: relative; width: 58px; height: 58px; padding: 0;
        border: 1px solid #3a4156; border-radius: 8px; background: #1a2030; color: #e6e6e6;
        cursor: pointer; overflow: hidden; }
      #abilities .ability-slot:hover { border-color: #3b82f6; }
      #abilities .ability-cd { position: absolute; left: 0; bottom: 0; width: 100%; height: 0;
        background: rgba(0,0,0,0.55); pointer-events: none; }
      #abilities .ability-key { position: absolute; top: 3px; left: 5px; font-size: 11px; color: #8893a7; }
      #abilities .ability-name { position: absolute; bottom: 5px; width: 100%; text-align: center;
        font-size: 11px; }

      /* Inventory panel (shown by InventoryPanel; toggle with I) */
      #inventory { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 8; display: none; flex-direction: column; gap: 8px; padding: 12px;
        background: rgba(13,16,24,0.95); border: 1px solid #2a3142; border-radius: 10px; }
      #inventory .inv-header { display: flex; align-items: center; justify-content: space-between;
        font-size: 14px; color: #cdd6e6; }
      #inventory .inv-header button { border: 0; background: #2a3142; color: #cdd6e6;
        border-radius: 6px; padding: 2px 8px; cursor: pointer; font-size: 13px; }
      #inv-grid { display: grid; grid-template-columns: repeat(4, 64px); grid-auto-rows: 64px; gap: 6px; }
      .inv-slot { position: relative; border: 1px solid #2a3142; border-radius: 8px; background: #161b27;
        display: flex; align-items: center; justify-content: center; text-align: center; padding: 3px;
        box-sizing: border-box; }
      .inv-slot.filled { background: #1d2433; border-color: #3a4156; }
      .inv-slot.fine { border-color: #5aa0ff; }
      .inv-slot.rare { border-color: #c77dff; }
      .inv-slot.relic { border-color: #ffb347; }
      .inv-slot .inv-name { font-size: 10px; line-height: 1.15; color: #e6e6e6; word-break: break-word; }
      .inv-slot .inv-qty { position: absolute; right: 3px; bottom: 2px; font-size: 11px; font-weight: 700;
        color: #ffe066; text-shadow: 0 1px 2px #000; }
      .inv-slot.equippable { cursor: pointer; }
      .inv-slot.equippable:hover { border-color: #5aa0ff; }
      /* Equipment strip above the bag grid */
      #inv-gear { display: grid; grid-template-columns: repeat(4, 64px); grid-auto-rows: 40px; gap: 6px;
        margin-bottom: 4px; }
      .gear-slot { position: relative; border: 1px dashed #2a3142; border-radius: 8px; background: #14181f;
        color: #cdd6e6; padding: 2px; cursor: default; overflow: hidden; }
      .gear-slot.filled { border-style: solid; background: #1d2433; border-color: #3a4156; cursor: pointer; }
      .gear-slot.filled:hover { border-color: #ef6b6b; }
      .gear-slot.fine { border-color: #5aa0ff; }
      .gear-slot.rare { border-color: #c77dff; }
      .gear-slot.relic { border-color: #ffb347; }
      .gear-slot .gear-label { font-size: 10px; line-height: 1.1; word-break: break-word; }
      .gear-slot .gear-label.empty { color: #5b6678; text-transform: capitalize; }

      /* Bank panel (shown when standing at a town bank; toggle B) */
      #bank { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 9; display: none; flex-direction: column; gap: 8px; padding: 12px; width: 460px;
        background: rgba(13,16,24,0.97); border: 1px solid #2a3142; border-radius: 10px; }
      #bank .bank-header { display: flex; align-items: center; justify-content: space-between;
        font-size: 14px; color: #cdd6e6; }
      #bank .bank-header button { border: 0; background: #2a3142; color: #cdd6e6; border-radius: 6px;
        padding: 2px 8px; cursor: pointer; font-size: 13px; }
      #bank-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      #bank-cols h4 { margin: 0 0 4px; font-size: 12px; color: #8893a7; font-weight: 600; }
      .bank-col-list { display: flex; flex-direction: column; gap: 4px; max-height: 46vh; overflow-y: auto; }
      .bank-row { text-align: left; border: 1px solid #2a3142; background: #1a2030; color: #e6e6e6;
        border-radius: 6px; padding: 5px 8px; font-size: 13px; cursor: pointer; }
      .bank-row:hover { border-color: #3b82f6; }
      .bank-empty { font-size: 12px; color: #5b6678; padding: 4px 2px; }

      /* Crafting panel (toggle C) */
      #craft { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 9; display: none; flex-direction: column; gap: 8px; padding: 12px; width: 320px;
        background: rgba(13,16,24,0.97); border: 1px solid #2a3142; border-radius: 10px; }
      #craft .craft-header { display: flex; align-items: center; justify-content: space-between;
        font-size: 14px; color: #cdd6e6; }
      #craft .craft-header button { border: 0; background: #2a3142; color: #cdd6e6; border-radius: 6px;
        padding: 2px 8px; cursor: pointer; font-size: 13px; }
      #craft-list { display: flex; flex-direction: column; gap: 5px; max-height: 50vh; overflow-y: auto; }
      .craft-row { text-align: left; border: 1px solid #2a3142; background: #1a2030; color: #e6e6e6;
        border-radius: 6px; padding: 6px 8px; cursor: pointer; }
      .craft-row:hover:enabled { border-color: #3b82f6; }
      .craft-row:disabled { opacity: 0.45; cursor: default; }
      .craft-row .craft-title { font-size: 13px; }
      .craft-row .craft-detail { font-size: 11px; color: #8893a7; }

      /* Quest log (toggle J) */
      #quests { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 9; display: none; flex-direction: column; gap: 8px; padding: 12px; width: 360px;
        background: rgba(13,16,24,0.97); border: 1px solid #2a3142; border-radius: 10px; }
      #quests .quest-header { display: flex; align-items: center; justify-content: space-between;
        font-size: 14px; color: #cdd6e6; }
      #quests .quest-header button { border: 0; background: #2a3142; color: #cdd6e6; border-radius: 6px;
        padding: 2px 8px; cursor: pointer; font-size: 13px; }
      #quest-list { display: flex; flex-direction: column; gap: 8px; max-height: 56vh; overflow-y: auto; }
      .quest-card { border: 1px solid #2a3142; background: #161b27; border-radius: 8px; padding: 8px; }
      .quest-card .quest-title { font-size: 13px; font-weight: 600; color: #ffe066; }
      .quest-card .quest-summary { font-size: 12px; color: #cdd6e6; margin: 2px 0 4px; }
      .quest-card .quest-obj { font-size: 12px; color: #aeb8c8; }
      .quest-card .quest-obj.done { color: #6fcf6f; }
      .quest-btn { margin-top: 6px; border: 0; background: #3b82f6; color: #fff; border-radius: 6px;
        padding: 4px 10px; cursor: pointer; font-size: 12px; }
      .quest-btn:hover { background: #2f6fe0; }
      .quest-empty { font-size: 12px; color: #5b6678; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="login">
      <h1>⚔ Emberfall</h1>
      <input id="name" type="text" placeholder="Username" maxlength="24" autocomplete="username" />
      <input
        id="password"
        type="password"
        placeholder="Password (accounts only)"
        autocomplete="current-password"
      />
      <div class="row">
        <button id="enter" type="button">Play as Guest</button>
        <button id="btn-login" type="button" class="secondary">Log In</button>
        <button id="btn-register" type="button" class="secondary">Register</button>
      </div>
      <div id="login-error"></div>
      <div class="hint hint-desktop">Move: WASD / arrows · Target: click an entity (Esc to clear) · Attack: hold Space</div>
      <div class="hint hint-mobile">Move: drag the left side · Target: tap an enemy · Attack: hold the ⚔ button</div>
    </div>
    <div id="hud"></div>
    <div id="abilities"></div>
    <div id="chat">
      <div id="chat-log"></div>
      <div id="chat-row">
        <button id="chat-channel" type="button">Zone</button>
        <input id="chat-input" type="text" maxlength="200" placeholder="Press Enter to chat" autocomplete="off" />
      </div>
    </div>
    <div id="inventory">
      <div class="inv-header"><span>Inventory (I)</span><button id="inv-close" type="button">✕</button></div>
      <div id="inv-grid"></div>
    </div>
    <div id="bank">
      <div class="bank-header"><span>Bank (B)</span><button id="bank-close" type="button">✕</button></div>
      <div id="bank-cols">
        <div><h4>Bank — click to withdraw</h4><div id="bank-items" class="bank-col-list"></div></div>
        <div><h4>Bag — click to deposit</h4><div id="bank-bag" class="bank-col-list"></div></div>
      </div>
    </div>
    <div id="craft">
      <div class="craft-header"><span>Crafting (C)</span><button id="craft-close" type="button">✕</button></div>
      <div id="craft-list"></div>
    </div>
    <div id="quests">
      <div class="quest-header"><span>Quest Log (J)</span><button id="quest-close" type="button">✕</button></div>
      <div id="quest-list"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
