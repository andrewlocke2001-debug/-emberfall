<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <title>Emberfall</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0d1018; color: #e6e6e6;
        font-family: system-ui, -apple-system, sans-serif; overflow: hidden;
        overscroll-behavior: none; }
      #game { width: 100vw; height: 100vh; }
      /* touch-action:none so dragging the joystick doesn't scroll/zoom the page */
      #game canvas { display: block; touch-action: none; }
      #login { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column;
        gap: 16px; align-items: center; justify-content: center; background: #0d1018; }
      #login h1 { margin: 0; font-size: 30px; letter-spacing: 1px; }
      #login .row { display: flex; gap: 8px; }
      #login input { padding: 11px 13px; font-size: 16px; border-radius: 8px;
        border: 1px solid #2a3142; background: #1a2030; color: #fff; outline: none; }
      #login input:focus { border-color: #3b82f6; }
      #login button { padding: 11px 20px; font-size: 16px; font-weight: 600; border-radius: 8px;
        border: 0; background: #3b82f6; color: #fff; cursor: pointer; }
      #login button:hover { background: #2f6fe0; }
      #login button.secondary { background: #2a3142; }
      #login button.secondary:hover { background: #353e54; }
      #login input { width: 260px; }
      /* Stack the auth buttons full-width so they never overlap (and read well
         on mobile). */
      #login .row { flex-direction: column; width: 260px; }
      #login .row button { width: 100%; }
      #login .hint { font-size: 13px; color: #8893a7; max-width: 360px; text-align: center; line-height: 1.5; }
      #login-error { font-size: 14px; color: #ef4444; min-height: 18px; text-align: center; }
      .hint-mobile { display: none; }
      @media (pointer: coarse) {
        .hint-desktop { display: none; }
        .hint-mobile { display: block; }
      }

      /* In-game HUD + chat (shown by ChatBox once you're in the world) */
      #hud { position: fixed; top: 10px; left: 12px; z-index: 5; display: none;
        font-size: 14px; color: #cdd6e6; background: rgba(13,16,24,0.55);
        padding: 4px 10px; border-radius: 6px; pointer-events: none; }
      #chat { position: fixed; bottom: 10px; left: 10px; z-index: 6; display: none;
        flex-direction: column; gap: 6px; width: min(360px, 72vw); }
      #chat-log { display: flex; flex-direction: column; gap: 2px; max-height: 28vh;
        overflow-y: auto; font-size: 13px; line-height: 1.35; }
      #chat-log .line { background: rgba(13,16,24,0.5); padding: 2px 8px; border-radius: 6px;
        width: fit-content; max-width: 100%; word-break: break-word; }
      #chat-log .from { color: #ffe066; }
      #chat-log .global .from { color: #7cc7ff; }
      #chat-row { display: flex; gap: 6px; }
      #chat-channel { flex: 0 0 auto; padding: 6px 10px; border: 0; border-radius: 6px;
        cursor: pointer; font-size: 13px; background: #2a3142; color: #cdd6e6; }
      #chat-channel.global { background: #21406b; color: #cfe4ff; }
      #chat-input { flex: 1 1 auto; padding: 6px 10px; border-radius: 6px;
        border: 1px solid #2a3142; background: rgba(26,32,48,0.92); color: #fff;
        font-size: 14px; outline: none; }
      #chat-input:focus { border-color: #3b82f6; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="login">
      <h1>⚔ Emberfall</h1>
      <input id="name" type="text" placeholder="Username" maxlength="24" autocomplete="username" />
      <input
        id="password"
        type="password"
        placeholder="Password (accounts only)"
        autocomplete="current-password"
      />
      <div class="row">
        <button id="enter" type="button">Play as Guest</button>
        <button id="btn-login" type="button" class="secondary">Log In</button>
        <button id="btn-register" type="button" class="secondary">Register</button>
      </div>
      <div id="login-error"></div>
      <div class="hint hint-desktop">Move: WASD / arrows · Target: click an entity (Esc to clear) · Attack: hold Space</div>
      <div class="hint hint-mobile">Move: drag the left side · Target: tap an enemy · Attack: hold the ⚔ button</div>
    </div>
    <div id="hud"></div>
    <div id="chat">
      <div id="chat-log"></div>
      <div id="chat-row">
        <button id="chat-channel" type="button">Zone</button>
        <input id="chat-input" type="text" maxlength="200" placeholder="Press Enter to chat" autocomplete="off" />
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
