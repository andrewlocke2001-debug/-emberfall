# Fly.io config for the Emberfall zone server.
# Set the app name after `fly launch --no-deploy` (see design/DEPLOY.md).
app = "emberfall-server"
primary_region = "gru" # São Paulo — pick the region closest to your players

[build]
  dockerfile = "server/Dockerfile"

[env]
  PORT = "2567"

[http_service]
  internal_port = 2567
  force_https = true
  # An MMO server must stay up — never autostop the machine.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
