<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background:
      radial-gradient(120% 90% at 50% 115%, rgba(245,158,11,0.30) 0%, rgba(245,158,11,0) 55%),
      radial-gradient(100% 70% at 50% -10%, #1b2233 0%, #0b0e14 60%);
    font-family: Georgia, "Palatino Linotype", serif;
  }
  body.transparent { background: none; }
  .emberdots { position: absolute; inset: 0; pointer-events: none; background-image:
      radial-gradient(2px 2px at 12% 78%, rgba(255,178,102,.8) 0 40%, transparent 60%),
      radial-gradient(1.6px 1.6px at 28% 62%, rgba(255,209,102,.7) 0 40%, transparent 60%),
      radial-gradient(2.2px 2.2px at 44% 84%, rgba(255,158,94,.75) 0 40%, transparent 60%),
      radial-gradient(1.4px 1.4px at 58% 58%, rgba(255,209,102,.6) 0 40%, transparent 60%),
      radial-gradient(2px 2px at 71% 76%, rgba(255,178,102,.8) 0 40%, transparent 60%),
      radial-gradient(1.5px 1.5px at 84% 64%, rgba(255,224,138,.7) 0 40%, transparent 60%),
      radial-gradient(1.2px 1.2px at 37% 47%, rgba(255,209,102,.45) 0 40%, transparent 60%),
      radial-gradient(1.8px 1.8px at 91% 82%, rgba(255,158,94,.65) 0 40%, transparent 60%); }
  h1 {
    font-size: var(--title, 64px); font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    background: linear-gradient(180deg, #fff3d6 0%, #ffd166 45%, #c2651b 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 3px 18px rgba(245,158,11,0.45)); white-space: nowrap;
  }
  .tag { font-style: italic; font-size: var(--tag, 15px); color: #a9b2c4;
    letter-spacing: 0.22em; margin-top: var(--taggap, 8px); }
  .sword { font-size: var(--sword, 0px); line-height: 1; margin-bottom: 10px;
    filter: drop-shadow(0 2px 10px rgba(245,158,11,.5)); }
</style></head>
<body>
  <div class="emberdots"></div>
  <div class="sword" id="sword">⚔</div>
  <h1 id="t">EMBERFALL</h1>
  <div class="tag" id="tag">A WORLD LIT BY DYING EMBERS</div>
  <script>
    const q = new URLSearchParams(location.search);
    document.documentElement.style.setProperty("--title", (q.get("title") || 64) + "px");
    document.documentElement.style.setProperty("--tag", (q.get("tag") || 15) + "px");
    document.documentElement.style.setProperty("--taggap", (q.get("taggap") || 8) + "px");
    document.documentElement.style.setProperty("--sword", (q.get("sword") || 0) + "px");
    if (q.get("notag")) document.getElementById("tag").style.display = "none";
    if (q.get("transparent")) { document.body.classList.add("transparent");
      document.querySelector(".emberdots").style.display = "none"; }
  </script>
</body></html>
