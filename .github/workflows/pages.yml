name: Deploy single-player to Pages

# Builds the client in single-player mode (VITE_SOLO=1 → the in-browser engine,
# no server, no login) and publishes it to GitHub Pages. The result is a static
# link anyone can play on any device, at zero hosting cost. Real multiplayer
# still lives on the server; this is the free play-test build.
# NOTE: manual-only for now. GitHub Pages needs a PUBLIC repo on the free plan;
# `-emberfall` is private, so an auto-run would fail (and email) on every push.
# Make the repo public (Settings ▸ change visibility), then run this from the
# Actions tab → link: https://andrewlocke2001-debug.github.io/-emberfall/
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newer pushes supersede in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build single-player client
        run: npm run build -w @mmo/client
        env:
          VITE_SOLO: "1"
      # Relative base ("./") in vite.config already handles the /-emberfall/ subpath.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
